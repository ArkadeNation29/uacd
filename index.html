<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animash DB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --accent3: #6affca;
      --text: #e8e8f0;
      --text-dim: #7a7a9a;
      --card-bg: #0f0f1a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(124,106,255,0.12); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(255,106,155,0.08); bottom: 100px; right: -50px; }
    .orb-3 { width: 250px; height: 250px; background: rgba(106,255,202,0.06); top: 40%; left: 60%; }

    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .hero-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent3);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      border: 1px solid rgba(106,255,202,0.25);
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .hero-title {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.4s;
    }

    .hero-title span.hl {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 1rem;
      color: var(--text-dim);
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.6s;
    }

    .search-wrap {
      width: 100%;
      max-width: 560px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.8s;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 1.2rem;
      color: var(--text-dim);
      font-size: 1.1rem;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.2rem 1rem 3.2rem;
      font-size: 1rem;
      font-family: 'Syne', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: var(--text-dim); }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
    }

    .search-hint {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-dim);
      margin-top: 0.75rem;
      text-align: left;
      padding-left: 0.3rem;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.2s;
    }

    .scroll-arrow {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 1.8s ease infinite;
    }

    .results-section {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
      display: none;
    }

    .results-section.visible { display: block; }

    .results-header {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .results-header span { color: var(--accent3); }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.35s ease forwards;
      opacity: 0;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124,106,255,0.12);
    }

    .card-thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      background: var(--surface2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-combo {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }

    .card-tier {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .tier-s { background: rgba(255,200,50,0.15); color: #ffc832; border: 1px solid rgba(255,200,50,0.3); }
    .tier-a { background: rgba(124,106,255,0.15); color: var(--accent); border: 1px solid rgba(124,106,255,0.3); }
    .tier-b { background: rgba(106,255,202,0.1); color: var(--accent3); border: 1px solid rgba(106,255,202,0.25); }
    .tier-c { background: rgba(255,106,155,0.1); color: var(--accent2); border: 1px solid rgba(255,106,155,0.25); }
    .tier-d { background: rgba(122,122,154,0.1); color: var(--text-dim); border: 1px solid var(--border); }

    .no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      grid-column: 1 / -1;
    }

    .no-results .icon { font-size: 2.5rem; margin-bottom: 1rem; }

    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }

    .footer a { color: var(--accent); text-decoration: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s ease;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      gap: 1.2rem;
      align-items: flex-start;
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-thumb {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      background: var(--surface2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      overflow: hidden;
    }

    .modal-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }

    .modal-title-wrap { flex: 1; }

    .modal-name {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .modal-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .modal-combo {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }

    .modal-close:hover { border-color: var(--accent2); color: var(--accent2); }

    .modal-body { padding: 1.2rem 1.5rem 1.5rem; }

    .modal-section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      margin-top: 1.5rem;
    }

    .modal-section-label:first-child { margin-top: 0; }

    .lore-text {
      font-size: 0.88rem;
      line-height: 1.8;
      color: #c0c0d8;
    }

    .lore-text p + p { margin-top: 0.8rem; }

    /* Skills */
    .skills-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .skill-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
    }

    .skill-card.ultimate {
      border-color: rgba(255,200,50,0.3);
      background: rgba(255,200,50,0.04);
    }

    .skill-card.skill3 {
      border-color: rgba(124,106,255,0.3);
      background: rgba(124,106,255,0.04);
    }

    .skill-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }

    .skill-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.18rem 0.5rem;
      border-radius: 5px;
      text-transform: uppercase;
    }

    .label-skill1, .label-skill2 {
      background: rgba(106,255,202,0.08);
      color: var(--accent3);
      border: 1px solid rgba(106,255,202,0.2);
    }

    .label-skill3 {
      background: rgba(124,106,255,0.12);
      color: var(--accent);
      border: 1px solid rgba(124,106,255,0.3);
    }

    .label-ultimate {
      background: rgba(255,200,50,0.12);
      color: #ffc832;
      border: 1px solid rgba(255,200,50,0.3);
    }

    .skill-name {
      font-weight: 700;
      font-size: 0.9rem;
      flex: 1;
    }

    .skill-unlock {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: #ffc832;
      opacity: 0.8;
    }

    .skill-hits { display: flex; flex-direction: column; gap: 0.4rem; }

    .skill-hit {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .hit-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-dim);
      min-width: 40px;
    }

    .effect-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; }

    .effect-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .fx-direct_hit   { background: rgba(255,106,155,0.12); color: var(--accent2); border: 1px solid rgba(255,106,155,0.25); }
    .fx-aoe          { background: rgba(255,150,50,0.12);  color: #ff9632;        border: 1px solid rgba(255,150,50,0.25); }
    .fx-dot          { background: rgba(180,80,255,0.12);  color: #b450ff;        border: 1px solid rgba(180,80,255,0.25); }
    .fx-stun         { background: rgba(255,200,50,0.12);  color: #ffc832;        border: 1px solid rgba(255,200,50,0.3); }
    .fx-nerf         { background: rgba(255,60,60,0.1);    color: #ff5c5c;        border: 1px solid rgba(255,60,60,0.25); }
    .fx-buff         { background: rgba(106,255,202,0.1);  color: var(--accent3); border: 1px solid rgba(106,255,202,0.25); }
    .fx-untouchable  { background: rgba(200,200,255,0.1);  color: #c8c8ff;        border: 1px solid rgba(200,200,255,0.2); }
    .fx-reflect      { background: rgba(124,106,255,0.12); color: var(--accent);  border: 1px solid rgba(124,106,255,0.3); }
    .fx-heal         { background: rgba(80,255,120,0.1);   color: #50ff78;        border: 1px solid rgba(80,255,120,0.25); }
    .fx-heal_ot      { background: rgba(50,200,100,0.1);   color: #32c864;        border: 1px solid rgba(50,200,100,0.25); }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <section class="hero" id="hero">
    <div class="hero-tag">Community Database</div>
    <h1 class="hero-title">Ultimate<br><span class="hl">Animash Database</span></h1>
    <p class="hero-sub">Temukan semua kombinasi combo, tier, dan data animash dalam satu tempat.</p>

    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Cari animal, item, atau kombinasi..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <p class="search-hint">// ketik nama animal atau item untuk mulai pencarian</p>
    </div>

    <div class="scroll-hint" id="scrollHint">
      scroll
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <section class="results-section" id="resultsSection">
    <div class="results-header">
      — <span id="resultsCount">0</span> hasil ditemukan
    </div>
    <div class="results-grid" id="resultsGrid"></div>
  </section>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-thumb" id="modalThumb"></div>
        <div class="modal-title-wrap">
          <div class="modal-name" id="modalName"></div>
          <div class="modal-meta">
            <span class="modal-combo" id="modalCombo"></span>
            <span class="card-tier" id="modalTier"></span>
          </div>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <footer class="footer">
    animash-db &middot; community data &middot; <a href="https://github.com" target="_blank">github</a>
  </footer>

  <script>
    // ===== DATA =====
    let ANIMASH_DATA = [
      {
        id: 1, name: "Flamara", combo: ["Flarix", "Mara"], tier: "S", emoji: "🔥",
        lore: "Flamara adalah hasil fusi langka antara Flarix dan Mara yang hanya bisa terjadi di kawasan gunung berapi aktif. Tubuhnya memancarkan panas konstan yang mampu melelehkan batu biasa dalam hitungan detik.\n\nDikenal sebagai salah satu predator puncak di ekosistemnya, Flamara jarang terlihat bersama sejenisnya. Ia lebih memilih berburu sendirian di malam hari ketika suhu lingkungan turun drastis.\n\nLegenda lokal menyebutnya sebagai 'nyala yang tak pernah padam' karena tidak ada catatan Flamara yang pernah dikalahkan di habitat aslinya.",
        skills: [
          { name: "Ember Strike", type: "skill1", hits: [{ effects: ["direct_hit"] }] },
          { name: "Heat Aura", type: "skill2", hits: [{ effects: ["buff", "dot"] }] },
          { name: "Twin Flame", type: "skill3", hits: [{ effects: ["direct_hit", "aoe"] }, { effects: ["dot", "nerf"] }] },
          { name: "Inferno Nova", type: "ultimate", unlock_level: 25, hits: [{ effects: ["aoe", "dot", "stun"] }, { effects: ["aoe", "dot", "nerf"] }] }
        ]
      },
      {
        id: 2, name: "Aquhorn", combo: ["Aqua", "Thornix"], tier: "A", emoji: "💧",
        lore: "Aquhorn terbentuk dari perpaduan unik antara elemen air dan duri tajam Thornix. Tanduk kristalnya mampu membelah arus air dan memantulkan cahaya menjadi senjata yang mematikan.\n\nSpesies ini dikenal memiliki kemampuan adaptasi luar biasa — bisa bertahan di lingkungan kering maupun bawah air dengan efisiensi yang sama.",
        skills: [
          { name: "Hydro Spike", type: "skill1", hits: [{ effects: ["direct_hit", "dot"] }] },
          { name: "Thorn Barrier", type: "skill2", hits: [{ effects: ["reflect", "buff"] }] },
          { name: "Aqua Burst", type: "skill3", hits: [{ effects: ["aoe", "direct_hit"] }, { effects: ["stun"] }] },
          { name: "Torrent Lance", type: "ultimate", unlock_level: 20, hits: [{ effects: ["aoe", "direct_hit", "nerf"] }, { effects: ["dot", "stun"] }] }
        ]
      },
      {
        id: 3, name: "Terravolt", combo: ["Terran", "Voltix"], tier: "A", emoji: "⚡",
        lore: "Terravolt adalah anomali alam — fusi antara tanah yang stabil dan petir yang tak terduga. Setiap langkahnya meninggalkan bekas gosong di tanah, dan badannya selalu mengeluarkan muatan listrik statis.\n\nPara peneliti mencatat bahwa Terravolt cenderung muncul sebelum badai besar, seolah-olah ia mampu merasakan perubahan tekanan udara jauh sebelum manusia.",
        skills: [
          { name: "Ground Shock", type: "skill1", hits: [{ effects: ["direct_hit", "stun"] }] },
          { name: "Static Field", type: "skill2", hits: [{ effects: ["aoe", "nerf"] }] },
          { name: "Volt Slam", type: "skill3", hits: [{ effects: ["direct_hit", "aoe"] }, { effects: ["stun", "dot"] }] },
          { name: "Earthquake Surge", type: "ultimate", unlock_level: 22, hits: [{ effects: ["aoe", "direct_hit", "stun"] }, { effects: ["aoe", "nerf", "dot"] }] }
        ]
      }
    ];

    // Uncomment kalau sudah ada data.json:
    // fetch('./data.json')
    //   .then(r => r.json())
    //   .then(data => { ANIMASH_DATA = data; })
    //   .catch(console.error);

    // ===== EFFECT LABELS =====
    const EFFECT_LABELS = {
      direct_hit:  "Direct Hit",
      aoe:         "AOE",
      dot:         "DoT",
      stun:        "Stun",
      nerf:        "Nerf",
      buff:        "Buff",
      untouchable: "Untouchable",
      reflect:     "Reflect",
      heal:        "Heal",
      heal_ot:     "Heal OT",
    };

    const SKILL_TYPE_LABEL = {
      skill1: "Skill 1",
      skill2: "Skill 2",
      skill3: "Skill 3",
      ultimate: "Ultimate",
    };

    // ===== SEARCH =====
    const input = document.getElementById('searchInput');
    const section = document.getElementById('resultsSection');
    const grid = document.getElementById('resultsGrid');
    const countEl = document.getElementById('resultsCount');
    const scrollHint = document.getElementById('scrollHint');

    function renderCard(item, delay) {
      const div = document.createElement('div');
      div.className = 'card';
      div.style.animationDelay = delay + 'ms';
      const thumbContent = item.image
        ? `<img src="${item.image}" alt="${item.name}" />`
        : (item.emoji || '?');
      div.innerHTML = `
        <div class="card-thumb">${thumbContent}</div>
        <div class="card-info">
          <div class="card-name">${item.name}</div>
          <div class="card-combo">${item.combo[0]} + ${item.combo[1]}</div>
          <span class="card-tier tier-${item.tier.toLowerCase()}">Tier ${item.tier}</span>
        </div>
      `;
      div.addEventListener('click', () => openModal(item));
      return div;
    }

    function search(query) {
      const q = query.trim().toLowerCase();
      if (!q) {
        section.classList.remove('visible');
        scrollHint.style.display = '';
        return;
      }
      scrollHint.style.display = 'none';
      const results = ANIMASH_DATA.filter(item =>
        item.name.toLowerCase().includes(q) ||
        item.combo.some(c => c.toLowerCase().includes(q)) ||
        item.tier.toLowerCase() === q
      );
      grid.innerHTML = '';
      countEl.textContent = results.length;
      section.classList.add('visible');
      if (results.length === 0) {
        grid.innerHTML = `<div class="no-results"><div class="icon">🔍</div>Tidak ada hasil untuk "<strong>${query}</strong>"</div>`;
        return;
      }
      results.forEach((item, i) => grid.appendChild(renderCard(item, i * 50)));
      setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }

    let debounceTimer;
    input.addEventListener('input', e => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => search(e.target.value), 200);
    });

    // ===== MODAL =====
    const overlay   = document.getElementById('modalOverlay');
    const modalThumb = document.getElementById('modalThumb');
    const modalName  = document.getElementById('modalName');
    const modalCombo = document.getElementById('modalCombo');
    const modalTier  = document.getElementById('modalTier');
    const modalBody  = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');

    function renderEffectTag(fx) {
      return `<span class="effect-tag fx-${fx}">${EFFECT_LABELS[fx] || fx}</span>`;
    }

    function renderSkill(skill) {
      const isUlt = skill.type === 'ultimate';
      const isSk3 = skill.type === 'skill3';
      const typeLabel = SKILL_TYPE_LABEL[skill.type] || skill.type;
      const labelClass = `label-${skill.type}`;
      const cardClass = isUlt ? 'skill-card ultimate' : isSk3 ? 'skill-card skill3' : 'skill-card';

      const hitsHTML = skill.hits.map((hit, i) => {
        const showHitLabel = skill.hits.length > 1;
        return `
          <div class="skill-hit">
            ${showHitLabel ? `<span class="hit-label">Hit ${i + 1}</span>` : ''}
            <div class="effect-tags">${hit.effects.map(renderEffectTag).join('')}</div>
          </div>`;
      }).join('');

      const unlockHTML = skill.unlock_level
        ? `<span class="skill-unlock">unlock lv.${skill.unlock_level}</span>`
        : '';

      return `
        <div class="${cardClass}">
          <div class="skill-header">
            <span class="skill-label ${labelClass}">${typeLabel}</span>
            <span class="skill-name">${skill.name}</span>
            ${unlockHTML}
          </div>
          <div class="skill-hits">${hitsHTML}</div>
        </div>`;
    }

    function openModal(item) {
      // Thumb
      modalThumb.innerHTML = item.image
        ? `<img src="${item.image}" alt="${item.name}" />`
        : (item.emoji || '?');

      // Header info
      modalName.textContent = item.name;
      modalCombo.textContent = `${item.combo[0]} + ${item.combo[1]}`;
      modalTier.className = `card-tier tier-${item.tier.toLowerCase()}`;
      modalTier.textContent = `Tier ${item.tier}`;

      // Body
      let bodyHTML = '';

      // Lore
      if (item.lore) {
        const paragraphs = item.lore.split('\n\n').map(p => `<p>${p}</p>`).join('');
        bodyHTML += `
          <div class="modal-section-label">// lore</div>
          <div class="lore-text">${paragraphs}</div>`;
      }

      // Skills
      if (item.skills && item.skills.length) {
        bodyHTML += `<div class="modal-section-label">// skills</div>`;
        bodyHTML += `<div class="skills-list">${item.skills.map(renderSkill).join('')}</div>`;
      }

      modalBody.innerHTML = bodyHTML;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
